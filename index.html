<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>人物提示詞產生器</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="dark-theme mode-clean">
    
    <!-- Header -->
    <header class="app-header">
        <div class="title-container">
            <h1>人物<span class="highlight">提示詞</span>產生器</h1>
            <p>輕鬆創造屬於你的完美男/女主角提示詞</p>
        </div>
        
        <div class="header-controls">
            <div class="mode-switcher">
                <button class="mode-btn active" data-mode="clean" onclick="setMode('clean')">清純版(Safe)</button>
                <button class="mode-btn" data-mode="sexy" onclick="setMode('sexy')">性感版(Standard)</button>
                <button class="mode-btn" data-mode="nsfw" onclick="setMode('nsfw')">NSFW版(Uncensored)</button>
            </div>
        </div>
    </header>

    <!-- Main App Container -->
    <main class="main-container">
        
        <!-- Left: Editor / Controls -->
        <section class="editor-section">
            <div class="scroll-hint">👉 左右滑動切換更多分類</div>
            <div class="tabs" id="tabs-container">
                <!-- Generated by JS -->
            </div>
            
            <div class="tab-contents-wrapper" id="content-container">
                <!-- Generated by JS -->
            </div>
        </section>

        <!-- Right: Realtime Result -->
        <aside class="result-section">
            
            <div class="panel">
                <div class="panel-header">
                    <h2 class="panel-title">英文提示詞 (Prompt)</h2>
                </div>
                <textarea id="prompt-en" class="prompt-box" readonly placeholder="Waiting for parameters..."></textarea>
                <div class="action-buttons">
                    <button class="btn btn-primary" onclick="PromptEngine.copy('en')">複製英文 Prompt</button>
                    <button class="btn btn-outline" onclick="PromptEngine.randomize()">🎲 隨機選取</button>
                </div>
            </div>

            <div class="panel">
                <div class="panel-header">
                    <h2 class="panel-title">中文提示詞 (Reference)</h2>
                </div>
                <textarea id="prompt-zh" class="prompt-box" readonly placeholder="中文參考說明..."></textarea>
                <div class="action-buttons">
                    <button class="btn btn-primary" onclick="PromptEngine.copy('zh')">複製中文說明</button>
                    <button class="btn btn-outline" onclick="PromptEngine.clear()" style="border-color: var(--danger); color: var(--danger)">🗑️ 重新選擇</button>
                </div>
            </div>
            
        </aside>
    </main>

    <div id="toast-container"></div>

    <!-- Data & Scripts -->
    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
